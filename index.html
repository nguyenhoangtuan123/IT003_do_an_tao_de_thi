<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Đề Thi IT003</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        /* Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4 md:p-8">

    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 md:p-8 text-white text-center">
            <h1 class="text-3xl font-bold mb-2">Hệ Thống Sinh Đề Thi Tự Động</h1>
            <p class="text-indigo-100">Đồ án môn học IT003</p>
        </div>

        <div class="p-6 md:p-8 space-y-8">
            <!-- Section 1: Upload -->
            <section class="bg-gray-50 rounded-xl p-6 border border-gray-100 shadow-sm">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    1. Cập nhật Ngân hàng câu hỏi
                </h2>
                
                <form id="upload-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Chọn file (.json, .xlsx, .xls, .docx)</label>
                        <input type="file" id="file-input" accept=".json, .xlsx, .xls, .docx" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100 border border-gray-300 rounded-md bg-white">
                    </div>
                    
                    <div class="flex items-center space-x-6">
                        <label class="inline-flex items-center">
                            <input type="radio" name="upload-mode" value="append" checked class="form-radio text-indigo-600">
                            <span class="ml-2 text-sm text-gray-700">Thêm vào DB hiện tại</span>
                        </label>
                        <label class="inline-flex items-center">
                            <input type="radio" name="upload-mode" value="overwrite" class="form-radio text-red-600">
                            <span class="ml-2 text-sm text-red-600 font-medium">Xoá toàn bộ DB & Ghi đè</span>
                        </label>
                    </div>

                    <button type="submit" id="upload-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-lg transition-colors flex items-center justify-center">
                        <span>Tải lên Database</span>
                    </button>
                    <p id="upload-status" class="text-sm font-medium hidden"></p>
                </form>
            </section>

            <!-- Section 2: Generate -->
            <section class="bg-blue-50 rounded-xl p-6 border border-blue-100 shadow-sm">
                <h2 class="text-xl font-semibold text-gray-800 mb-4 flex items-center">
                    <svg class="w-6 h-6 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    2. Tạo và Xuất Đề Thi (.docx)
                </h2>
                
                <form id="generate-form" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Số lượng mã đề cần tạo</label>
                            <input type="number" id="num-exams" min="1" max="50" value="4" required class="block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm px-4 py-2 border">
                            <p class="mt-1 text-xs text-gray-500">Tối đa 50 đề mỗi lần xuất.</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Tiền tố mã đề (Tuỳ chọn)</label>
                            <input type="text" id="prefix" value="IT003_De" placeholder="Ví dụ: KTGK_De" class="block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm px-4 py-2 border">
                            <p class="mt-1 text-xs text-gray-500">Hệ thống sẽ thêm số thứ tự: IT003_De_001, IT003_De_002...</p>
                        </div>
                    </div>

                    <button type="submit" id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors flex items-center justify-center text-lg shadow-md">
                        <span id="generate-btn-text">Trộn & Tải File .Zip</span>
                        <div id="generate-spinner" class="loader ml-3 hidden"></div>
                    </button>
                    <p id="generate-status" class="text-sm font-medium text-center hidden"></p>
                </form>
            </section>
        </div>
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000/api";

        // DOM Upload
        const uploadForm = document.getElementById('upload-form');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadStatus = document.getElementById('upload-status');

        // DOM Generate
        const generateForm = document.getElementById('generate-form');
        const generateBtn = document.getElementById('generate-btn');
        const generateBtnText = document.getElementById('generate-btn-text');
        const generateSpinner = document.getElementById('generate-spinner');
        const generateStatus = document.getElementById('generate-status');

        // Upload Logic
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const file = fileInput.files[0];
            if (!file) {
                alert("Vui lòng chọn file trước!");
                return;
            }
            
            const mode = document.querySelector('input[name="upload-mode"]:checked').value;
            if (mode === 'overwrite' && !confirm("CẢNH BÁO: Việc này sẽ xoá toàn bộ câu hỏi đang có. Bạn chắc chắn chứ?")) {
                return;
            }

            const isJson = file.name.toLowerCase().endsWith('.json');
            const isExcel = file.name.toLowerCase().match(/\.(xlsx|xls)$/);
            const isWord = file.name.toLowerCase().endsWith('.docx');
            
            if (!isJson && !isExcel && !isWord) {
                alert("Chỉ hỗ trợ file .json, .xlsx, hoặc .docx");
                return;
            }

            let endpoint = '';
            if (isJson) endpoint = '/admin/upload-json';
            else if (isExcel) endpoint = '/admin/upload-excel';
            else if (isWord) endpoint = '/admin/upload-word';
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('mode', mode);

            uploadBtn.disabled = true;
            uploadBtn.classList.add('opacity-75');
            uploadBtn.innerHTML = 'Đang xử lý...';
            
            uploadStatus.classList.remove('hidden', 'text-green-600', 'text-red-600');
            uploadStatus.classList.add('text-indigo-600');
            uploadStatus.textContent = "Đang tải lên và lưu vào Database...";

            try {
                const res = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    uploadStatus.classList.replace('text-indigo-600', 'text-green-600');
                    uploadStatus.textContent = "✓ " + data.message;
                    fileInput.value = "";
                } else {
                    uploadStatus.classList.replace('text-indigo-600', 'text-red-600');
                    uploadStatus.textContent = "✗ Lỗi: " + data.message;
                }
            } catch (err) {
                uploadStatus.classList.replace('text-indigo-600', 'text-red-600');
                uploadStatus.textContent = "✗ Không thể kết nối Server.";
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.classList.remove('opacity-75');
                uploadBtn.innerHTML = 'Tải lên Database';
            }
        });

        // Generate Logic
        generateForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const numExams = document.getElementById('num-exams').value;
            const prefix = document.getElementById('prefix').value || "DeThi";

            generateBtn.disabled = true;
            generateBtn.classList.add('bg-blue-400');
            generateBtnText.textContent = 'Đang trộn đề & tạo file...';
            generateSpinner.classList.remove('hidden');
            
            generateStatus.classList.remove('hidden', 'text-green-600', 'text-red-600');
            generateStatus.textContent = "";

            try {
                const res = await fetch(`${API_URL}/generate-exams`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        num_exams: parseInt(numExams),
                        prefix: prefix
                    })
                });

                if (!res.ok) {
                    const data = await res.json();
                    generateStatus.classList.add('text-red-600');
                    generateStatus.textContent = "✗ Lỗi: " + (data.message || "Lỗi máy chủ");
                    return;
                }

                // Nhận file ZIP
                const blob = await res.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                
                // Lấy tên file từ header Content-Disposition nếu có, nếu không thì dùng mặc định
                let filename = `DeThi_${prefix}.zip`;
                const contentDisposition = res.headers.get('Content-Disposition');
                if (contentDisposition && contentDisposition.includes('filename=')) {
                    filename = contentDisposition.split('filename=')[1].replace(/"/g, '');
                }
                
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);

                generateStatus.classList.add('text-green-600');
                generateStatus.textContent = "✓ Tạo và tải xuống thành công!";

            } catch (err) {
                generateStatus.classList.add('text-red-600');
                generateStatus.textContent = "✗ Lỗi kết nối đến Server.";
                console.error(err);
            } finally {
                generateBtn.disabled = false;
                generateBtn.classList.remove('bg-blue-400');
                generateBtnText.textContent = 'Trộn & Tải File .Zip';
                generateSpinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
